name: Deploy API to Docker Hub
on:
  workflow_call:
    inputs:
      image-name:
        description: "Nombre de la imagen docker"
        required: true
        type: string
      image-tag:
        description: Nombre de version ( tag git v1.0.0)
        required: true
        type: string
    secrets:
      DOCKER_USERNAME:
        required: true
      DOCKER_PASSWORD:
        required: true
  workflow_dispatch:
    inputs:
      image-name:
        description: Nombre de la imagen 
        required: true
        type: string
      image-tag:
        description: Etiqueta de esta version(v1.0.0)
        required: true
        type: string


jobs:
  build_and_push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Configure docker hub credentials
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: build and push
        run: |
          IMAGEN_COMPLETA="${{ secrets.DOCKER_USERNAME }}/${{ inputs.image-name }}"
          docker build \
            -t "${IMAGEN_COMPLETA}:${{ inputs.image-tag }}" \
            -t "${IMAGEN_COMPLETA}:latest" \
            .
          docker push --all-tags "${IMAGEN_COMPLETA}"
